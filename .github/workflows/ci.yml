name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install
      - run: npx prisma generate --schema=servanza-services/api/prisma/schema.prisma
      - run: npx prisma generate --schema=servanza-services/workers/prisma/schema.prisma || true
      - run: npx tsc -p servanza-services/api/tsconfig.json --noEmit || true
      - run: npm test || true
